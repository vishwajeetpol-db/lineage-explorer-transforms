bundle:
  name: nexus-lineage

variables:
  warehouse_id:
    description: "SQL Warehouse ID for executing queries (required)"
  cache_ttl_seconds:
    description: "Cache TTL in seconds for lineage data"
    default: "28800"
  cache_max_memory_mb:
    description: "Max in-memory cache footprint in MB"
    default: "250"
  admin_group_name:
    description: "Workspace group whose members are treated as admins"
    default: "admins"
  rate_limit_max_requests:
    description: "Max requests per user per window"
    default: "60"
  rate_limit_window_seconds:
    description: "Rate-limit window in seconds"
    default: "60"
  lineage_window_days:
    description: "Lookback window (days) for system.access lineage queries"
    default: "365"
  cost_cache_ttl_seconds:
    description: "TTL (seconds) for the per-entity serverless-cost cache; billing rolls up daily"
    default: "21600"
  lineage_catalog:
    description: "Catalog where transformation lineage Delta tables are stored"
    default: "lattice_lineage"
  lineage_schema:
    description: "Schema within lineage_catalog for transformation lineage tables"
    default: "lineage"
  pipeline_notebook_path:
    description: "Workspace path to the run_all notebook for building transformation lineage"
    default: ""
  transform_cache_ttl_seconds:
    description: "TTL (seconds) for transformation lineage cache (shorter than table lineage)"
    default: "3600"
  build_cache_ttl_hours:
    description: "Hours before transformation lineage is considered stale and needs rebuild"
    default: "24"
  app_name:
    description: "Databricks App name. Override to avoid collisions in a shared workspace or to run multiple instances."
    default: "lineage-explorer"

# Files excluded from `databricks bundle deploy` uploads.
# `.databricksignore` is best-effort across CLI versions — `sync.exclude` is authoritative.
sync:
  exclude:
    - ".git"
    - ".gitignore"
    - ".databricks"
    - ".claude"
    - ".venv"
    - ".vscode"
    - ".idea"
    - "**/__pycache__"
    - "**/*.pyc"
    - "**/.DS_Store"
    - "frontend/node_modules"
    - "frontend/src"
    - "frontend/public"
    - "frontend/index.html"
    - "frontend/package.json"
    - "frontend/package-lock.json"
    - "frontend/tsconfig.json"
    - "frontend/vite.config.ts"
    - "frontend/tailwind.config.ts"
    - "frontend/postcss.config.js"
    - "tests"
    - "backend/tests"
    - "monitoring"
    - "pytest.ini"
    - "requirements-dev.txt"
    - "create_stress_test.py"
    - "generate_stress_test.py"
    - "setup_demo_lineage.py"
    - "setup_full_demo.py"
    - "setup.sql"
    - "grant_app_access.sh"
    - "*.png"
    - "ss_*"
    - "screenshot_*"
    - ".env"
    - ".env.*"
    - "*.pem"
    - "*.key"
    - "table_dependancy_graph"
    - "worspace_details_access_tokens"
    - "CODEOWNERS"
    - ".github"

targets:
  dev:
    mode: development
    default: true
    # Host comes from CLI profile:
    #   databricks bundle deploy -t dev --profile <profile> --var warehouse_id=<id>
    variables:
      rate_limit_max_requests: "200"  # higher cap for dev (admin dashboard polls every 10s)
      app_name: "lineage-explorer-direct"
    resources:
      apps:
        lineage-explorer:
          name: ${var.app_name}
          description: "Unity Catalog Lineage Explorer — Interactive DAG visualization"
          source_code_path: .
          resources:
            - name: sql-warehouse
              sql_warehouse:
                id: ${var.warehouse_id}
                permission: CAN_USE
          config:
            command:
              - uvicorn
              - backend.main:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_WAREHOUSE_ID
                value: ${var.warehouse_id}
              - name: CACHE_TTL_SECONDS
                value: ${var.cache_ttl_seconds}
              - name: CACHE_MAX_MEMORY_MB
                value: ${var.cache_max_memory_mb}
              - name: ADMIN_GROUP_NAME
                value: ${var.admin_group_name}
              - name: RATE_LIMIT_MAX_REQUESTS
                value: ${var.rate_limit_max_requests}
              - name: RATE_LIMIT_WINDOW_SECONDS
                value: ${var.rate_limit_window_seconds}
              - name: LINEAGE_WINDOW_DAYS
                value: ${var.lineage_window_days}
              - name: COST_CACHE_TTL_SECONDS
                value: ${var.cost_cache_ttl_seconds}
              - name: LINEAGE_CATALOG
                value: ${var.lineage_catalog}
              - name: LINEAGE_SCHEMA
                value: ${var.lineage_schema}
              - name: PIPELINE_NOTEBOOK_PATH
                value: ${var.pipeline_notebook_path}
              - name: TRANSFORM_CACHE_TTL_SECONDS
                value: ${var.transform_cache_ttl_seconds}
              - name: BUILD_CACHE_TTL_HOURS
                value: ${var.build_cache_ttl_hours}

  prod:
    mode: production
    # Host comes from CLI profile:
    #   databricks bundle deploy -t prod --profile <profile> --var warehouse_id=<id>
    resources:
      apps:
        lineage-explorer:
          name: ${var.app_name}
          description: "Unity Catalog Lineage Explorer — Interactive DAG visualization"
          source_code_path: .
          resources:
            - name: sql-warehouse
              sql_warehouse:
                id: ${var.warehouse_id}
                permission: CAN_USE
          config:
            command:
              - uvicorn
              - backend.main:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_WAREHOUSE_ID
                value: ${var.warehouse_id}
              - name: CACHE_TTL_SECONDS
                value: ${var.cache_ttl_seconds}
              - name: CACHE_MAX_MEMORY_MB
                value: ${var.cache_max_memory_mb}
              - name: ADMIN_GROUP_NAME
                value: ${var.admin_group_name}
              - name: RATE_LIMIT_MAX_REQUESTS
                value: ${var.rate_limit_max_requests}
              - name: RATE_LIMIT_WINDOW_SECONDS
                value: ${var.rate_limit_window_seconds}
              - name: LINEAGE_WINDOW_DAYS
                value: ${var.lineage_window_days}
              - name: COST_CACHE_TTL_SECONDS
                value: ${var.cost_cache_ttl_seconds}
              - name: LINEAGE_CATALOG
                value: ${var.lineage_catalog}
              - name: LINEAGE_SCHEMA
                value: ${var.lineage_schema}
              - name: PIPELINE_NOTEBOOK_PATH
                value: ${var.pipeline_notebook_path}
              - name: TRANSFORM_CACHE_TTL_SECONDS
                value: ${var.transform_cache_ttl_seconds}
              - name: BUILD_CACHE_TTL_HOURS
                value: ${var.build_cache_ttl_hours}
